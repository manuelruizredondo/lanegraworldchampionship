# Despliegue en Netlify — sitio Astro estático
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirección 301: el dominio de Netlify redirige al dominio definitivo
# (evita contenido duplicado; www→raíz ya lo gestiona Netlify automáticamente).
[[redirects]]
  from = "https://lanegraworld.netlify.app/*"
  to = "https://campeonatopasoslibres.com/:splat"
  status = 301
  force = true

# Astro genera 404.html automáticamente desde src/pages/404.astro.
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
