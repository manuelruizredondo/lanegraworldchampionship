<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Tareas · La Negra</title>
<style>
  :root {
    --bg:#0f0b1e; --panel:#17132a; --card:#1e1836; --line:#2b2450;
    --ink:#f4f1fb; --muted:#a79fce; --gold:#cc9933; --gold-2:#e6b955;
    --red:#e0556b; --green:#3fbf87;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(130% 120% at 50% 0%,#221a3d 0%,var(--bg) 60%); color:var(--ink);
    min-height:100vh; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:820px; margin:0 auto; padding:clamp(20px,5vw,56px) 18px 80px; }

  /* Gate */
  .gate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px; }
  .gate-box { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--line);
    border-radius:20px; padding:34px 28px; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,.45); }
  .lock { font-size:34px; }
  .gate-box h1 { font-size:21px; margin:12px 0 4px; letter-spacing:-.02em; }
  .gate-box p { color:var(--muted); font-size:14px; margin:0 0 20px; }
  .gate-box input { width:100%; padding:13px 16px; border-radius:12px; border:1px solid var(--line);
    background:#120e24; color:var(--ink); font-size:16px; outline:none; text-align:center; letter-spacing:.05em; }
  .gate-box input:focus { border-color:var(--gold); }
  .gate-box button { width:100%; margin-top:14px; padding:13px 16px; border:0; border-radius:12px;
    background:linear-gradient(135deg,var(--gold-2),var(--gold)); color:#1a1206; font-weight:800;
    font-size:15px; cursor:pointer; transition:transform .12s, filter .2s; }
  .gate-box button:hover { transform:translateY(-1px); filter:brightness(1.05); }
  .err { color:var(--red); font-size:13px; margin-top:12px; min-height:16px; }

  /* Contenido */
  .top h1 { font-size:clamp(26px,5vw,40px); letter-spacing:-.03em; margin:0 0 4px; }
  .top .meta { color:var(--muted); font-size:14px; margin:0 0 8px; }
  .hl { color:var(--gold-2); font-weight:700; }
  .bar { height:1px; background:var(--line); margin:22px 0; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px 22px; margin:16px 0; }
  .card h2 { font-size:17px; margin:0 0 12px; letter-spacing:-.01em; }
  .block-red { border-color:rgba(224,85,107,.45); }
  .block-green { border-color:rgba(63,191,135,.4); }
  .block-gold { border-color:rgba(204,153,51,.5); }
  ul.tasks { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  ul.tasks li { line-height:1.5; }
  ul.tasks label { display:flex; gap:11px; align-items:flex-start; cursor:pointer; font-size:14.5px; color:var(--ink); }
  ul.tasks input { margin-top:3px; width:17px; height:17px; accent-color:var(--gold); flex:0 0 auto; }
  ul.tasks i { color:var(--muted); font-style:italic; }
  ul.tasks code { background:#120e24; border:1px solid var(--line); border-radius:6px; padding:1px 6px; font-size:12.5px; }
  ul.tasks input:checked + span { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--gold); }
  .done { color:var(--muted); font-size:14px; line-height:1.6; margin:0; }
  ol.qs { margin:0; padding-left:20px; color:var(--ink); font-size:14.5px; line-height:1.7; }
  .foot { color:var(--muted); font-size:12px; text-align:center; margin-top:30px; }
  .reset { color:var(--gold-2); background:none; border:0; cursor:pointer; font-size:12px; text-decoration:underline; }
</style>
</head>
<body>
  <div class="gate" id="gate">
    <form class="gate-box" id="gateForm">
      <div class="lock">🔒</div>
      <h1>Tareas · La Negra</h1>
      <p>Introduce la contraseña para ver el panel.</p>
      <input id="pw" type="password" autocomplete="off" autofocus placeholder="Contraseña" />
      <button type="submit">Entrar</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <main class="wrap" id="app" hidden>
    <div class="top">
      <h1>Tareas · La Negra</h1>
    </div>
    <div class="bar"></div>
    <div id="content"></div>
    <p class="foot">Panel interno · <button class="reset" id="reset">reiniciar marcas</button> · <button class="reset" id="logout">salir</button></p>
  </main>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function tryDecrypt(pw) {
  const salt = b64(DATA.salt), iv = b64(DATA.iv), ct = b64(DATA.ct);
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:DATA.iter, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const buf = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(buf);
}

function persist() {
  const store = JSON.parse(localStorage.getItem("tareas-lanegra") || "{}");
  document.querySelectorAll("#content input[type=checkbox]").forEach(cb => {
    const k = cb.dataset.k;
    if (store[k]) cb.checked = true;
    cb.addEventListener("change", () => {
      const s = JSON.parse(localStorage.getItem("tareas-lanegra") || "{}");
      s[k] = cb.checked; localStorage.setItem("tareas-lanegra", JSON.stringify(s));
    });
  });
}

function reveal(html) {
  document.getElementById("content").innerHTML = html;
  document.getElementById("gate").hidden = true;
  document.getElementById("app").hidden = false;
  persist();
  try { sessionStorage.setItem("tareas-ok", "1"); } catch(e){}
}

document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "";
  try {
    const html = await tryDecrypt(pw);
    reveal(html);
  } catch (_) {
    err.textContent = "Contraseña incorrecta.";
    document.getElementById("pw").select();
  }
});

document.getElementById("reset").addEventListener("click", () => {
  if (confirm("¿Reiniciar todas las marcas?")) { localStorage.removeItem("tareas-lanegra"); location.reload(); }
});
document.getElementById("logout").addEventListener("click", () => {
  sessionStorage.removeItem("tareas-ok"); location.reload();
});
</script>
</body>
</html>
