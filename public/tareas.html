<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Tareas · La Negra</title>
<style>
:root{--bg:#eef1f6;--card:#fff;--ink:#1c2430;--muted:#7c8798;--line:#e7ebf1;--blue:#3d6afe;
--u-bg:#ffe0e7;--u-fg:#d43b60;--c-bg:#fff2c9;--c-fg:#a5820d;--m-bg:#e0e7ff;--m-fg:#3d6afe;--p-bg:#d1f0e4;--p-fg:#11946a;}
*{box-sizing:border-box;}[hidden]{display:none !important;}
body{margin:0;font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.wrap{max-width:600px;margin:0 auto;padding:26px 16px 90px;}
.ico{flex:0 0 auto;}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;}
.gate-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:34px 28px;text-align:center;box-shadow:0 20px 50px rgba(28,36,48,.10);}
.lock svg{width:36px;height:36px;stroke:var(--blue);}
.gate-box h1{font-size:21px;margin:14px 0 4px;letter-spacing:-.02em;}
.gate-box p{color:var(--muted);font-size:14px;margin:0 0 20px;}
.gate-box input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--line);background:#f7f9fc;color:var(--ink);font-size:16px;outline:none;text-align:center;letter-spacing:.05em;}
.gate-box input:focus{border-color:var(--blue);}
.gate-box button{width:100%;margin-top:14px;padding:13px 16px;border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer;}
.err{color:var(--u-fg);font-size:13px;margin-top:12px;min-height:16px;}
.hd{margin:0 4px 20px;}
.hd h1{font-size:27px;letter-spacing:-.03em;margin:0;}
.hd p{color:var(--muted);font-size:15px;margin:3px 0 0;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:26px;}
.stat{position:relative;border:0;border-radius:20px;padding:16px 18px;text-align:left;cursor:pointer;transition:transform .12s,box-shadow .2s,outline-color .15s;outline:2px solid transparent;outline-offset:2px;font-family:inherit;}
.stat:hover{transform:translateY(-2px);}
.stat.active{outline-color:currentColor;box-shadow:0 12px 26px rgba(28,36,48,.12);}
.stat-ico{display:inline-flex;width:34px;height:34px;border-radius:11px;align-items:center;justify-content:center;background:rgba(255,255,255,.6);margin-bottom:26px;}
.stat-b{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;}
.stat-l{font-weight:700;font-size:15px;line-height:1.15;}
.stat-n{font-weight:800;font-size:28px;line-height:1;letter-spacing:-.02em;}
.s-urgente{background:var(--u-bg);color:var(--u-fg);}.s-cliente{background:var(--c-bg);color:var(--c-fg);}
.s-manu{background:var(--m-bg);color:var(--m-fg);}.s-propuesta{background:var(--p-bg);color:var(--p-fg);}
.stat .stat-l,.stat .stat-n{color:#1c2430;}
.lhd{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px;}
.lhd h2{font-size:17px;margin:0;letter-spacing:-.01em;}
.lhd button{border:0;background:none;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.task{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:11px;box-shadow:0 4px 14px rgba(28,36,48,.04);overflow:hidden;transition:box-shadow .2s;}
.task.open{box-shadow:0 10px 26px rgba(28,36,48,.09);}
.task-row{display:flex;align-items:center;gap:13px;padding:15px 16px;}
.tcheck{position:relative;flex:0 0 auto;display:inline-flex;cursor:pointer;}
.tcheck input{position:absolute;opacity:0;width:0;height:0;}
.tcheck-box{width:26px;height:26px;border-radius:50%;border:2px solid #cdd6e3;display:inline-flex;align-items:center;justify-content:center;color:#fff;transition:background .15s,border-color .15s;}
.tcheck-box svg{opacity:0;transition:opacity .15s;}
.tcheck input:checked + .tcheck-box{background:var(--blue);border-color:var(--blue);}
.tcheck input:checked + .tcheck-box svg{opacity:1;}
.tcheck-ok{width:26px;height:26px;border-radius:50%;background:var(--p-fg);color:#fff;align-items:center;justify-content:center;}
.task-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
.task-title{font-weight:600;font-size:16px;line-height:1.3;}
.task.done .task-title{color:var(--muted);text-decoration:line-through;text-decoration-color:#cdd6e3;}
.task-tag{align-self:flex-start;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;}
.tag-urgente{background:var(--u-bg);color:var(--u-fg);}.tag-cliente{background:var(--c-bg);color:var(--c-fg);}
.tag-manu{background:var(--m-bg);color:var(--m-fg);}.tag-propuesta{background:var(--p-bg);color:var(--p-fg);}.tag-done{background:#eef1f6;color:var(--muted);}
.task-exp{flex:0 0 auto;width:32px;height:32px;border:0;border-radius:50%;background:#f2f5fa;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .25s;}
.task-exp:hover{background:#e7ebf1;}
.task.open .task-exp{transform:rotate(180deg);background:var(--m-bg);color:var(--blue);}
.task-info{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.task.open .task-info{max-height:320px;}
.task-info p{margin:0;padding:0 16px 16px 55px;font-size:14.5px;line-height:1.6;color:#55606f;}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;}
.reset{color:var(--blue);background:none;border:0;cursor:pointer;font-size:12px;text-decoration:underline;font-family:inherit;}
</style>
</head>

var b64 = function(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});};
async function tryDecrypt(pw){
  var salt=b64(DATA.salt),iv=b64(DATA.iv),ct=b64(DATA.ct);
  var base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:DATA.iter,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
  var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
  return new TextDecoder().decode(buf);
}
var STORE="tareas-lanegra";
function wire(){
  var content=document.getElementById("content");
  // acordeones
  content.querySelectorAll(".task-exp").forEach(function(btn){
    btn.addEventListener("click",function(){
      var t=btn.closest(".task");var open=t.classList.toggle("open");
      btn.setAttribute("aria-expanded",open?"true":"false");
    });
  });
  // checkboxes + persistencia
  var store=JSON.parse(localStorage.getItem(STORE)||"{}");
  content.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    var kk=cb.dataset.k;var task=cb.closest(".task");
    if(store[kk]){cb.checked=true;task.classList.add("done");}
    cb.addEventListener("change",function(){
      task.classList.toggle("done",cb.checked);
      var s=JSON.parse(localStorage.getItem(STORE)||"{}");s[kk]=cb.checked;localStorage.setItem(STORE,JSON.stringify(s));
    });
  });
  // contadores (sin contar los ya hechos ni la tarjeta done)
  ["urgente","cliente","manu","propuesta"].forEach(function(cat){
    var n=content.querySelectorAll('.task[data-cat="'+cat+'"]').length;
    var el=document.querySelector('[data-count="'+cat+'"]');if(el)el.textContent=n;
  });
  // filtros
  var current=null;var title=document.getElementById("listTitle");var clear=document.getElementById("clearFilter");
  var LBL={urgente:"Urgentes",cliente:"Por parte de cliente",manu:"Por parte de Manu",propuesta:"Propuestas"};
  function apply(cat){
    current=cat;
    document.querySelectorAll(".stat").forEach(function(s){s.classList.toggle("active",s.dataset.filter===cat);});
    content.querySelectorAll(".task").forEach(function(t){
      t.hidden = cat ? (t.dataset.cat!==cat) : false;
    });
    title.textContent = cat ? LBL[cat] : "Todas las tareas";
    clear.hidden = !cat;
  }
  document.querySelectorAll(".stat").forEach(function(s){
    s.addEventListener("click",function(){apply(current===s.dataset.filter?null:s.dataset.filter);});
  });
  clear.addEventListener("click",function(){apply(null);});
}
function reveal(html){
  document.getElementById("content").innerHTML=html;
  document.getElementById("gate").hidden=true;
  document.getElementById("app").hidden=false;
  wire();
}
document.getElementById("gateForm").addEventListener("submit",async function(e){
  e.preventDefault();var pw=document.getElementById("pw").value;var err=document.getElementById("err");err.textContent="";
  try{var html=await tryDecrypt(pw);reveal(html);}catch(_){err.textContent="Contraseña incorrecta.";document.getElementById("pw").select();}
});
document.getElementById("reset").addEventListener("click",function(){if(confirm("¿Reiniciar todas las marcas?")){localStorage.removeItem(STORE);location.reload();}});
document.getElementById("logout").addEventListener("click",function(){location.reload();});
</script>
